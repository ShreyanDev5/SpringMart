version: '3.8'

services:
  springmart-backend:
    # Build the image from the backend Dockerfile in this folder.
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Map host port 8080 to the container so the API is reachable locally.
      - "8080:8080"
    environment:
      # Activates application-docker.properties inside the container.
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      # Persist the H2 database outside the container.
      - ./data:/app/data