# Docker profile: keep the H2 database inside /app/data so the mounted volume can persist it.
spring.datasource.url=jdbc:h2:file:/app/data/springmartdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Show SQL here because containers are harder to inspect than local runs.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# The container listens on the same port exposed by Docker.
server.port=8080