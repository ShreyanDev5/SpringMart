spring.application.name=springmart

# Default local profile: store H2 data on disk so products survive app restarts.
spring.datasource.url=jdbc:h2:file:./data/springmartdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# update lets Hibernate create missing tables/columns without wiping existing data.
spring.jpa.hibernate.ddl-auto=update

# Helpful while learning/debugging: open the H2 console in the browser.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
