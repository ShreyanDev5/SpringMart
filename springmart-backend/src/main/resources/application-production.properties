# ===========================
# SpringMart - Production
# ===========================

# Deployment profile: runtime settings for hosted environments.
# Note: it still uses H2, so this is not yet a separate production database setup.
spring.datasource.url=jdbc:h2:file:./data/springmartdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Keep schema changes automatic, but avoid verbose SQL logging in hosted runs.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Use the platform-provided PORT when deployed.
server.port=${PORT:8080}
server.servlet.context-path=/

# H2 console is disabled so the database UI is not exposed publicly.
spring.h2.console.enabled=false

# Allow requests from the deployed frontend hosts.
spring.web.cors.allowed-origins=https://springmart-store.windsurf.build,https://*.netlify.app,https://*.netlify.com
spring.web.cors.allowed-methods=GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
